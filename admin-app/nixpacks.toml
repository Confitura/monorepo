[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps", "npm install --no-save serve"]

[phases.build]
cmds = ["npm run build"]

[variables]
VITE_API_URL = "https://api.confitura.pl/api"
VITE_SELF_URL = "https://app.confitura.pl"

[start]
cmd = "./node_modules/.bin/serve -s dist"
