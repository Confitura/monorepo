name: deploy images

on:
  push:
    branches: [ master ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin-app: ${{ steps.filter.outputs.admin-app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'jelatyna-backend/**'
            frontend:
              - 'webpage/**'
            admin-app:
              - 'admin-app/**'

  push-webpage:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Install nixpacks
        run: curl -sSL https://nixpacks.com/install.sh | bash
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push webpage
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/confitura-webpage
          nixpacks build webpage --name $IMAGE
          docker tag $IMAGE:latest $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

  push-admin-app:
    needs: changes
    if: needs.changes.outputs.admin-app == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Install nixpacks
        run: curl -sSL https://nixpacks.com/install.sh | bash
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push admin-app
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/confitura-admin-app
          nixpacks build admin-app --name $IMAGE
          docker tag $IMAGE:latest $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

  push-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Install nixpacks
        run: curl -sSL https://nixpacks.com/install.sh | bash
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/confitura-backend
          nixpacks build jelatyna-backend --name $IMAGE
          docker tag $IMAGE:latest $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
