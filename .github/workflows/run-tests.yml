# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven
# See supported Node.js release schedule at https://nodejs.org/en/about/releases/

name: run tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin-app: ${{ steps.filter.outputs.admin-app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'jelatyna-backend/**'
            frontend:
              - 'webpage/**'
            admin-app:
              - 'admin-app/**'

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: jelatyna-backend

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: run Maven
        run: mvn -B package

#      - name: Publish Test Report
#        if: success() || failure()
#        uses: scacap/action-surefire-report@v3

  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: webpage

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: webpage/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - run: npm test

  test-admin-app:
    needs: changes
    if: needs.changes.outputs.admin-app == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin-app

    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.5.2'
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'
          cache-dependency-path: admin-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test:unit

  all-tests-passed:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-admin-app]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more tests failed"
            exit 1
          fi
          echo "All tests passed or were skipped"
