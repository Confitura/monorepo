# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven
# See supported Node.js release schedule at https://nodejs.org/en/about/releases/

name: run tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jelatyna-backend

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Remove corrupted jars from cache
        run: find ~/.m2/repository -name "*.jar" -size 0 -delete
      - name: run Maven
        run: mvn -B package

#      - name: Publish Test Report
#        if: success() || failure()
#        uses: scacap/action-surefire-report@v3

  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: webpage

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: webpage/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint --if-present
      - run: npm run build --if-present
      - run: npm test

  test-admin-app:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin-app

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.5.2'
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
          cache-dependency-path: admin-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test:unit
